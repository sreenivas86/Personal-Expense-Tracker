services:

  # MySQL Database Service
  mysql:
    image: mysql:8-oracle
    container_name: mysql
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - 3306:3306
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Application Service
  expense_tracker:
    build:
      context: .
      dockerfile: Dockerfile.multi
    container_name: expense_tracker
    depends_on:
      mysql:
        condition: service_healthy   # ✅ Waits until MySQL passes healthcheck
    ports:
      - 8080:8080
    environment:
      APP_NAME: Expense-Tracker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: expense_tracker
      DB_USERNAME: root
      DB_PASSWORD: root123
    networks:
      - backend

networks:
  backend:
    driver: bridge