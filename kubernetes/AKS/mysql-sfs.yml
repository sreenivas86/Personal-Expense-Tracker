apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-sfs
  namespace: e-track-dev
spec:
  selector:
    matchLabels:
      app: mysql-sfs # has to match .spec.template.metadata.labels
  serviceName: "mysql-sfs"
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        app: mysql-sfs # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mysql-sfs
        image: mysql:8-oracle
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: sql-password
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: app-vars
              key: database-name
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        startupProbe:
          exec:
            command:
              - sh
              - -c
              - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
              - sh
              - -c
              - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          initialDelaySeconds: 30
          periodSeconds: 20

  volumes:
  - name: mysql-data
    persistentVolumeClaim:
      claimName: mysql-pvc