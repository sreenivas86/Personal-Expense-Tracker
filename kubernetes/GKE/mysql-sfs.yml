apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-sfs
  namespace: e-track-dev
spec:
  selector:
    matchLabels:
      app: mysql-sfs
  serviceName: "mysql-sfs"
  replicas: 2
  template:
    metadata:
      labels:
        app: mysql-sfs
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mysql-sfs
          image: mysql:8-oracle
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: sql-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: app-vars
                  key: database-name
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 20

  # ✅ CORRECT - volumeClaimTemplates for StatefulSet
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: mysql-premium-sc   # your StorageClass
        resources:
          requests:
            storage: 10Gi