apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: e-track

spec:
  serviceName: mysql
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8-oracle
        imagePullPolicy: IfNotPresent

        ports:
        - name: mysql
          containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: sql-password

        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: app-vars
              key: database-name

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        # resource section
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
      
        # 
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          failureThreshold: 30
          periodSeconds: 10

        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
          initialDelaySeconds: 30
          periodSeconds: 20
        

        
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc